; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-div]
board = esp32-div
board_build.arduino.memory_type = dio_qspi   ; 4MB DIO at 80 MHz
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/esp32-div>
build_flags =
	${env.build_flags}
	${env_4mb.build_flags}
	-Iboards/esp32-div
	-DCORE_DEBUG_LEVEL=1

	; Board identifier (generic ESP32-S3 handheld with PCF8574 buttons)
	-DHAS_SCREEN=1
	-DHAS_TOUCH=1
	-DHAS_BTN=0           ; buttons are on PCF8574, not GPIO

	;--- Display: ILI9341 240x320 on SPI Bus A ---
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MISO=37
	-DTFT_MOSI=35
	-DTFT_SCLK=36
	-DTFT_CS=17
	-DTFT_DC=16
	-DTFT_RST=0
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=27000000
	-DSPI_READ_FREQUENCY=20000000

	;--- Touch: XPT2046, same SPI bus (CS is separate) ---
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=18
	-DTOUCH_X_MIN=300
	-DTOUCH_X_MAX=3800
	-DTOUCH_Y_MIN=300
	-DTOUCH_Y_MAX=3800

	;--- Backlight: GPIO7, LEDC PWM ---
	-DBACKLIGHT=7
	-DTFT_BL=7
	-DMINBRIGHT=160
	-DTFT_BRIGHT_CHANNEL=0
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=5000

	;--- Screen rotation ---
	-DROTATION=1
	-DFP=1
	-DFM=2
	-DFG=3

	;--- SD Card ---
	-DSDCARD_CS=10
	-DSDCARD_MOSI=11
	-DSDCARD_MISO=13
	-DSDCARD_SCK=12
	-DSDCARD_CD=38

	;--- SPI Bus B (shared by CC1101, NRF24, PN532, SD) ---
	-DSPI_SCK_PIN=12
	-DSPI_MOSI_PIN=11
	-DSPI_MISO_PIN=13
	-DSPI_SS_PIN=10

	;--- CC1101 Sub-GHz ---
	-DUSE_CC1101_VIA_SPI
	-DCC1101_SS_PIN=5
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN
	-DCC1101_GDO0_PIN=6
	-DCC1101_GDO2_PIN=3
	-DFEATURE_SUBGHZ_TOOLS=1

	;--- NRF24 (3 modules) ---
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=15
	-DNRF24_SS_PIN=4    ; also PN532 SS — mutually exclusive
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	;--- PN532 RFID/NFC ---
	-DPN532_SCK=12
	-DPN532_MISO=13
	-DPN532_MOSI=11
	-DPN532_SS=4

	;--- GPS (Neo-6M on UART2) ---
	-DGPS_SERIAL_TX=48
	-DGPS_SERIAL_RX=47

	;--- IR ---
	-DIR_TX_PINS='{{"GPIO 14", 14}}'
	-DIR_RX_PINS='{{"GPIO 21", 21}}'
	-DTXLED=14
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;--- RF (one-pin modules) — not populated, use CC1101 ---
	-DRF_TX_PINS='{{"GPIO 14", 14}}'
	-DRF_RX_PINS='{{"GPIO 21", 21}}'

	;--- I²C (PCF8574) ---
	-DGROVE_SDA=8
	-DGROVE_SCL=9

	;--- No battery gauge / ADC ---
	;-DBAT_PIN=-1

	;--- FM Radio (not populated) ---
	;-DFM_SI4713=1

	;--- No microphone, no speaker ---
	;-DMIC_SPM1423=1
	-DPIN_CLK=-1
	-DI2S_SCLK_PIN=-1
	-DI2S_DATA_PIN=-1
	-DPIN_DATA=-1

	;--- No RGB LED ---
	;-DHAS_RGB_LED=1
	-DRGB_LED=-1

	;--- USB-as-HID (requires native USB port on S3) ---
	;-DUSB_as_HID=1
	-DBAD_TX=GROVE_SDA
	-DBAD_RX=GROVE_SCL

	;--- Device name ---
	-DDEVICE_NAME='"ESP32-DIV v2"'

lib_deps =
	${env.lib_deps}

lib_ignore =
	${env_4mb.lib_ignore}
